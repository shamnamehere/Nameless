<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nameless</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap');
        
        :root {
            /* Data Config */
            --main-title: "Brightwing";
            --inventory-title: "Miscellaneous";
            --sheet-url: "https://docs.google.com/spreadsheets/d/1fCqjePjNSEEvz8DTyXGTjlUlyR5VALe3tjYr8BgJFBo/edit";
            --link-label: "Tracker and Excerpts";
            
            /* Palette: Void & Parchment */
            --bg-void: #000000;
            --bg-stone: #0a0a0a;
            --bg-inset: #050505;
            
            --border-stone: #1f1f1f;
            --border-highlight: #3d3d3d;
            
            /* Accents */
            --accent-moss: #5c7a4c;
            --accent-moss-glow: rgba(92, 122, 76, 0.4);
            
            --accent-bone: #e8dfc5; 
            --accent-bone-dim: #adba4; /* Kept generic for fallback */
            --accent-gold: #c5a059;
            --accent-rust: #8c5e4d;
            --accent-umber: #3e2b22;
            
            /* Text */
            --text-primary: #dcd6ca;
            --text-secondary: #9c9488;
            --text-dim: #635e54;
            
            --corner-size: 16px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Lato', sans-serif; /* Default fallthrough */
            background-color: var(--bg-void);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* 1. Static Noise Texture */
        body {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            background-attachment: fixed;
        }

        /* 2. Grid Pattern Layer */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(92, 122, 76, 0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(92, 122, 76, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* 3. Scanline Overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.1) 2px,
                rgba(0, 0, 0, 0.1) 4px
            );
            opacity: 0.15;
            pointer-events: none;
            z-index: 9999;
        }

        .character-sheet { 
            max-width: 900px; 
            margin: 0 auto; 
            display: flex;
            flex-direction: column;
            gap: 20px; /* Reduced from 40px to bring sections closer */
            position: relative;
            z-index: 1;
            /* Unified Container Frame */
            padding: 20px;
            border: 1px solid var(--border-stone);
            box-shadow: 0 0 30px rgba(232, 223, 197, 0.04);
            background-color: var(--bg-void); /* Ensure sheet has background */
			overflow: hidden;
        }
        
/* Hide scrollbars during the expansion animation to prevent flickering */
.section-content, 
.stat-details {
    scrollbar-width: none; /* For Firefox */
    -ms-overflow-style: none; /* For Internet Explorer and Edge */
}

.section-content::-webkit-scrollbar, 
.stat-details::-webkit-scrollbar {
    display: none; /* For Chrome, Safari, and Opera */
}		
		
/* SVG Banner Styles */
.svg-banner-container {
    width: 100%;
    margin: 0 auto;
    text-align: center;
    position: relative;
    z-index: 5; /* Keep branches over text */
    margin-bottom: -50px; /* Original spacing */
    background-color: transparent;
    
    /* This shaves off the top 20% of the black space without moving the banner */
    clip-path: inset(20% 0 0 0); 
    /* This fixes the clicking issue */
    pointer-events: none; 
    /* This pulls the cropped banner up so the page starts higher */
    margin-top: -120px; 
}

.svg-banner-container svg {
    width: 100%;
    height: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    border-radius: 4px;
    background-color: transparent !important;
}

/* Ensure header is clickable and behind branches */
.section-header {
    position: relative;
    z-index: 4; 
    pointer-events: auto;
}
        
        /* Enhanced Sway Animation */
        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(1.2deg); }
        }
        .branches {
            /* Transform origin set near the left-hand root of the vector */
            transform-origin: 10% 40%; 
            animation: sway 12s ease-in-out infinite;
        }

        /* Star Twinkle Animation */
        @keyframes twinkle {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.5; }
        }
        .star {
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        /* Cloud Drift Animation - Left to Right */
        @keyframes cloudsDrift {
            from { transform: translateX(-400px); }
            to { transform: translateX(1600px); }
        }
        .cloud {
            animation: cloudsDrift var(--duration) linear infinite;
            opacity: 0.08;
            filter: blur(60px);
        }

        /* Brightwing text with same color as section headers */
        .brightwing-text {
            fill: var(--accent-bone); /* Changed to match section header color */
            filter: drop-shadow(0 0 8px rgba(232, 223, 197, 0.3));
        }

        /* First section positioned to overlap with banner */
        #section-detailed.section-placeholder {
            margin-top: -80px; /* Pulls the section up to overlap with banner */
            position: relative;
            z-index: 1;
        }
        
        /* Loaders */
        .loading, .error { 
            padding: 50px;
            text-align: center;
            background: var(--bg-stone);
            border: 1px solid var(--border-stone);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 2px solid rgba(92, 122, 76, 0.2);
            border-top-color: var(--accent-moss);
            border-radius: 50%;
            animation: spin 2s linear infinite;
            margin-right: 15px;
            vertical-align: middle;
            box-shadow: 0 0 10px var(--accent-moss-glow);
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Section Wrappers */
        .section-wrapper {
            background: var(--bg-stone);
            position: relative;
            border: 1px solid var(--border-stone);
            box-shadow: 0 20px 50px -10px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        
        /* Corner Ornament SVG Styling */
        .ornament-corner {
            position: absolute;
            width: 60px;
            height: 60px;
            pointer-events: none;
            opacity: 0.35;
            color: var(--accent-bone);
            z-index: 0;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
        }
        
        /* Fading tips via opacity on inner paths in SVG, here just ensure positioning */
        .ornament-top-left { top: 0; left: 0; }
        .ornament-bottom-right { bottom: 0; right: 0; transform: rotate(180deg); }
        
        /* Hairline Crack SVG Styling */
        .ornament-crack {
            position: absolute;
            width: 100px;
            height: 100px;
            pointer-events: none;
            opacity: 0.2;
            stroke: var(--text-dim);
            stroke-width: 1;
            fill: none;
            bottom: 0;
            left: 20%;
            z-index: 0;
        }

/* 1. Make the entire banner container ignore mouse clicks */
/* This allows you to click "through" the branches to the header below */
.svg-banner-container {
    pointer-events: none;
    z-index: 5; /* Keep it high visually */
}

/* 2. Ensure the Section Header is positioned to receive clicks */
.section-header {
    position: relative;
    z-index: 4; /* Higher than the background, lower than the banner's visual layer */
    pointer-events: auto; /* Explicitly allow clicking here */
    cursor: pointer;
}

/* 3. Fix the Scanline Overlay blocking everything */
body::after {
    pointer-events: none;
}

        /* Headers */
        .section-header {
            padding: 25px 35px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            background-color: rgba(15, 15, 15, 0.8); /* Slightly lighter than stone */
            border: none;
            border-bottom: 1px solid var(--border-stone);
            cursor: pointer;
            width: 100%;
            text-align: left;
            color: var(--accent-bone);
            display: flex;
            align-items: center;
            outline: none;
            position: relative;
            z-index: 1;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }
        
        .section-header:hover { 
            text-shadow: 0 0 8px rgba(232, 223, 197, 0.4);
        }

        /* Growing line on hover */
        .section-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 0%;
            height: 1px;
            background: linear-gradient(90deg, var(--accent-moss), var(--accent-gold));
            transition: width 0.6s ease;
            opacity: 0.7;
        }
        
        .section-header:hover::after {
            width: 100%;
        }
        
        .section-arrow {
            margin-right: 20px;
            font-size: 0.6em;
            color: var(--text-dim);
            transition: transform 0.4s ease;
        }
        
        .section-arrow.open { 
            transform: rotate(90deg); 
            color: var(--accent-moss); 
        }
        
        .section-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0, 1, 0, 1);
            background: var(--bg-stone);
            position: relative;
            z-index: 1;
        }
        
        .section-content.open { 
            max-height: 8000px; 
            transition: max-height 1s ease-in-out;
        }

        .stat-item {
            border-bottom: 1px solid var(--border-stone);
            position: relative;
        }
        .stat-item:last-child { border-bottom: none; }
        
        .stat-textbox {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s ease, box-shadow 0.3s ease;
            border-left: 2px solid transparent;
        }
        
        /* Stat Hover Effects */
        .stat-textbox.clickable:hover {
            background: rgba(232, 223, 197, 0.03);
            border-left-color: var(--accent-moss);
            box-shadow: -5px 0 10px -2px var(--accent-moss-glow);
            cursor: pointer;
        }
        
        .stat-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 600; /* Bumped up for Garamond */
            color: var(--text-primary);
            letter-spacing: 0.03em;
            transition: text-shadow 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-left: 8px; /* Added spacing where icon used to be */
        }
        
        .stat-textbox.clickable:hover .stat-name {
            text-shadow: 0 0 5px rgba(232, 223, 197, 0.6);
        }
        
        .stat-value {
            font-family: 'Cormorant Garamond', serif;
            font-variant-numeric: oldstyle-nums;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--accent-bone);
            transition: text-shadow 0.3s ease;
        }

        .stat-textbox.clickable:hover .stat-value {
            text-shadow: 0 0 8px rgba(197, 160, 89, 0.5);
        }
        
.stat-details {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.6s ease-in-out; /* Smoother transition for long text */
    background: var(--bg-inset);
    background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(255, 255, 255, 0.02) 4px
    );
}

.stat-item.active .stat-details {
    max-height: 5000px; /* Increased significantly to accommodate long lore */
    border-top: 1px solid var(--border-stone);
    border-bottom: 1px solid var(--border-stone);
    overflow-y: visible; /* Allows the content to breathe */
}

.details-content {
    padding: 30px 60px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.2rem;
    line-height: 1.7; /* Slightly increased for better readability of long blocks */
    color: var(--text-secondary);
    text-shadow: 0 0 2px rgba(232, 223, 197, 0.15);
    word-wrap: break-word; /* Ensures long words don't break the layout */
    white-space: pre-wrap; /* Preserves line breaks from your Google Sheet */
}
        
        .details-content p {
            margin-bottom: 0.15em;
        }
        .details-content p:last-child {
            margin-bottom: 0;
        }
        
        /* Attributes Grid */
        .attributes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 40px;
        }
        
        .attribute-item {
            padding: 15px;
            border: 1px solid var(--border-stone);
            background: var(--bg-stone);
            transition: box-shadow 0.3s ease;
        }
        
        /* Attribute Card Glows */
        .attribute-item.red:hover { box-shadow: 0 0 15px rgba(140, 94, 77, 0.3); }
        .attribute-item.green:hover { box-shadow: 0 0 15px rgba(92, 122, 76, 0.3); }
        .attribute-item.blue:hover { box-shadow: 0 0 15px rgba(110, 133, 153, 0.3); }
        .attribute-item.purple:hover { box-shadow: 0 0 15px rgba(138, 122, 148, 0.3); }
        .attribute-item.yellow:hover { box-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }

        .attribute-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            align-items: baseline;
        }
        
        .attribute-name {
            font-family: 'Lato', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .attribute-value {
            font-family: 'Cormorant Garamond', serif;
            font-variant-numeric: oldstyle-nums;
            font-weight: 700;
            font-size: 1.6rem;
            color: var(--accent-bone);
            text-shadow: 0 0 5px rgba(232, 223, 197, 0.2);
        }
        
        /* Progress Bars */
        .progress-container {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            width: 100%;
            border-radius: 1px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        
        .progress-bar {
            height: 100%;
            position: relative;
        }
        
        /* Static Glows */
        .red { color: var(--accent-rust) !important; }
        .progress-bar.red { background: var(--accent-rust); box-shadow: 0 0 8px var(--accent-rust); }
        
        .green { color: var(--accent-moss) !important; }
        .progress-bar.green { background: var(--accent-moss); box-shadow: 0 0 8px var(--accent-moss); }
        
        .blue { color: #6e8599 !important; }
        .progress-bar.blue { background: #6e8599; box-shadow: 0 0 8px #6e8599; }
        
        .purple { color: #8a7a94 !important; }
        .progress-bar.purple { background: #8a7a94; box-shadow: 0 0 8px #8a7a94; }
        
        .yellow { color: var(--accent-gold) !important; }
        .progress-bar.yellow { background: var(--accent-gold); box-shadow: 0 0 8px var(--accent-gold); }

        /* Two Column Grid */
        .two-column-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1px;
            background: var(--border-stone);
            padding: 1px 0; 
        }
        
        .two-column-grid .stat-item {
            background: var(--bg-stone);
            border-bottom: none;
        }
        
        /* Vertical Divider Gradient */
        .two-column-grid .stat-item:nth-child(even)::before {
            content: '';
            position: absolute;
            left: 0; top: 15%; bottom: 15%;
            width: 1px;
            background: linear-gradient(to bottom, transparent 0%, var(--border-stone) 50%, transparent 100%);
        }

        .sheet-link-item {
            grid-column: 1 / -1;
            background: var(--bg-inset) !important;
            margin: 20px 40px;
            border: 1px dashed var(--border-stone) !important;
            border-radius: 2px;
        }
        
        .sheet-link-text { 
            color: var(--accent-moss) !important;
            font-style: italic;
        }

        @media (max-width: 768px) {
            body { padding: 20px 10px; }
            .character-sheet { padding: 10px; gap: 10px; }
            .svg-banner-container { margin-bottom: -30px; }
            .svg-banner-container svg { max-height: 180px; }
            #section-detailed.section-placeholder { margin-top: -40px; }
            .attributes-grid { grid-template-columns: 1fr; padding: 25px; }
            .two-column-grid { grid-template-columns: 1fr; }
            .two-column-grid .stat-item:nth-child(even)::before { display: none; }
            .stat-textbox { padding: 15px 20px; }
            .details-content { padding: 20px; }
        }
    </style>

    <style>
      .section-content, .stat-details {
          max-height: none !important;
          overflow: visible !important;
      }
      .two-column-grid {
          grid-template-columns: 1fr 1fr !important;
      }
      .section-arrow {
          display: none !important;
      }
      .section-header, .stat-textbox {
          cursor: default !important;
      }
      .section-header:hover {
          color: var(--accent-bone) !important;
          text-shadow: none !important;
      }
      .stat-textbox.clickable:hover {
          background: transparent !important;
          box-shadow: none !important;
      }
      .stat-textbox.clickable:hover .stat-name {
          color: var(--text-primary) !important;
          text-shadow: none !important;
      }
      .stat-textbox.clickable:hover .stat-value {
          color: var(--accent-bone) !important;
          text-shadow: none !important;
          transform: none !important;
      }
    </style>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&display=swap');
      .details-content, .details-content p {
          font-family: 'Crimson Pro', serif !important;
          font-size: 20px !important;
          color: rgb(154, 144, 123) !important;
          font-style: normal !important;
      }
    </style>

    <style>
      #section-detailed .two-column-grid {
          grid-template-columns: 1fr !important;
      }
    </style>
</head>

                    { name: 'Agility', color: 'red', aliases: ['AGI', 'Agi', 'Agility'] },
                    { name: 'Constitution', color: 'red', aliases: ['CON', 'Con', 'Constitution'] },
                    { name: 'Intelligence', color: 'blue', aliases: ['INT', 'Int', 'Intelligence'] },
                    { name: 'Wisdom', color: 'blue', aliases: ['WIS', 'Wis', 'Wisdom'] },
                    { name: 'Wits', color: 'blue', aliases: ['WIT', 'Wit', 'Wits'] },
                    { name: 'Willpower',  color: 'yellow', aliases: ['WILL', 'Will', 'Willpower'] }
                ],
                right: [
                    { name: 'Charisma', color: 'green', aliases: ['CHA', 'Cha', 'Charisma'] },
                    { name: 'Manipulation', color: 'green', aliases: ['MNP', 'Mnp', 'Manipulation', 'MAN', 'Man'] },
                    { name: 'Appearance', color: 'green', aliases: ['APP', 'App', 'Appearance'] },
                    { name: 'Luck', color: 'purple', aliases: ['LUCK', 'Luck'] },
                    { name: 'Prowess', color: 'purple', aliases: ['PRW', 'Prw', 'Prowess'] },
                    { name: 'Protection', color: 'purple', aliases: ['PROT', 'Prot', 'Protection'] },
                    { name: 'Dread', icon: '💀', color: 'yellow', aliases: ['DREAD', 'Dread', 'DRD'] }
                ]
            }
        };
        
        const getConfig = (key) => getComputedStyle(document.documentElement).getPropertyValue(`--${key}`).trim().replace(/["']/g, '');
        
        const parseCSV = (text) => {
            const rows = [];
            let row = [], field = '', inQuotes = false;
            
            for (const c of text) {
                if (c === '"') inQuotes = !inQuotes;
                else if (c === ',' && !inQuotes) { row.push(field); field = ''; }
                else if (c === '\n' && !inQuotes) { 
                    row.push(field);
                    if (row.length) rows.push(row);
                    row = []; field = '';
                } else if (c !== '\r') field += c;
            }
            
            if (field || row.length) { row.push(field); rows.push(row); }
            return rows;
        };
        
        const fetchSheet = async (url) => {
            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                `https://corsproxy.io/?${encodeURIComponent(url)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
            ];
            
            for (const proxyUrl of proxies) {
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 4000);
                    const response = await fetch(proxyUrl, { signal: controller.signal });
                    clearTimeout(timeout);
                    if (response.ok) return await response.text();
                } catch { continue; }
            }
            throw new Error('All fetch attempts failed');
        };
        
        const escapeHtml = (text) => {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        };
        
        const toggleSection = (header, content) => {
            header.querySelector('.section-arrow').classList.toggle('open');
            content.classList.toggle('open');
        };
        
        // Helper to turn text block into paragraphs
        const formatParagraphs = (text) => {
             if (!text) return '';
             // Split by newlines, filter out empty lines, wrap in P tags
             return text.trim().split(/\n+/).map(line => `<p>${escapeHtml(line.trim())}</p>`).join('');
        };
        
        const createStatItem = (name, desc, val, container) => {
            const hasDesc = desc && String(desc).trim().length > 0;
            const item = document.createElement('div');
            item.className = 'stat-item';
            
            item.innerHTML = `
                <div class="stat-textbox ${hasDesc ? 'clickable' : ''}">
                    <div class="stat-name">${escapeHtml(name)}</div>
                    <div class="stat-value">${escapeHtml(val)}</div>
                </div>
                ${hasDesc ? `<div class="stat-details"><div class="details-content">${formatParagraphs(desc)}</div></div>` : ''}
            `;
            
            if (hasDesc) {
                item.querySelector('.stat-textbox').onclick = (e) => {
                    e.stopPropagation();
                    const active = item.classList.contains('active');
                    container.querySelectorAll('.stat-item.active').forEach(i => {
                        if (i !== item) i.classList.remove('active');
                    });
                    item.classList.toggle('active', !active);
                };
            }
            
            return item;
        };
        
        const renderAttributesGrid = (data, title, placeholder) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'section-wrapper';
            wrapper.innerHTML = SVG_BOTANICAL + SVG_CRACK; 
            
            const header = document.createElement('button');
            header.className = 'section-header';
            header.innerHTML = `<span class="section-arrow">➤</span>${title}`;
            
            const content = document.createElement('div');
            content.className = 'section-content';
            header.onclick = () => toggleSection(header, content);
            
            const csvAttributes = {};
            data.forEach(row => {
                const name = row[0]?.trim();
                const value = (row.length >= 13 ? row[12] : row[row.length - 1] || '0').trim();
                if (name) csvAttributes[name.toUpperCase()] = { displayName: name, value };
            });
            
            const findAttrValue = (attrConfig) => {
                for (const alias of attrConfig.aliases) {
                    if (csvAttributes[alias.toUpperCase()]) return csvAttributes[alias.toUpperCase()];
                }
                for (const key in csvAttributes) {
                    if (key.includes(attrConfig.name.toUpperCase().substring(0, 3))) return csvAttributes[key];
                }
                return { displayName: attrConfig.name, value: '0' };
            };
            
            const createAttrItem = (attr) => {
                const attrData = findAttrValue(attr);
                const numericValue = parseFloat(attrData.value.replace(/[^0-9.]/g, '')) || 0;
                const percentage = Math.min(Math.max(numericValue, 0), 100);
                
                // Added color class to attribute-item for card-level hover glow
                return `<div class="attribute-item ${attr.color}">
                    <div class="attribute-info">
                        <div class="attribute-name ${attr.color}">
                            ${escapeHtml(attrData.displayName)}
                        </div>
                        <div class="attribute-value">${escapeHtml(attrData.value)}</div>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar ${attr.color}" style="width: ${percentage}%"></div>
                    </div>
                </div>`;
            };
            
            const grid = document.createElement('div');
            grid.className = 'attributes-grid';
            
            const leftColumn = document.createElement('div');
            leftColumn.className = 'attribute-column';
            leftColumn.innerHTML = CONFIG.attributeLayout.left.map(createAttrItem).join('');
            
            const rightColumn = document.createElement('div');
            rightColumn.className = 'attribute-column';
            rightColumn.innerHTML = CONFIG.attributeLayout.right.map(createAttrItem).join('');
            
            grid.append(leftColumn, rightColumn);
            content.appendChild(grid);
            wrapper.append(header, content);
            placeholder.appendChild(wrapper);
        };
        
        const renderDetailed = (data, title, placeholder, twoColumns, isItems) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'section-wrapper';
            wrapper.innerHTML = SVG_BOTANICAL; 
            
            const header = document.createElement('button');
            header.className = 'section-header';
            header.innerHTML = `<span class="section-arrow">➤</span>${title}`;
            
            const content = document.createElement('div');
            content.className = 'section-content';
            header.onclick = () => toggleSection(header, content);
            
            const container = twoColumns ? document.createElement('div') : content;
            if (twoColumns) {
                container.className = 'two-column-grid';
                content.appendChild(container);
            }
            
            data.forEach(row => {
                const [name = '', desc = '', val = ''] = row;
                container.appendChild(createStatItem(name, desc, val, container));
            });
            
            if (isItems) {
                const sheetUrl = getConfig('sheet-url');
                const linkLabel = getConfig('link-label');
                
                if (sheetUrl) {
                    const linkItem = document.createElement('div');
                    linkItem.className = 'stat-item sheet-link-item';
                    linkItem.innerHTML = `
                        <div class="stat-textbox clickable">
                            <div class="stat-name">${escapeHtml(linkLabel)}</div>
                            <div class="stat-value">↗</div>
                        </div>
                    `;
                    linkItem.querySelector('.stat-textbox').onclick = (e) => {
                        e.stopPropagation();
                        window.open(sheetUrl, '_blank');
                    };
                    container.appendChild(linkItem);
                }
            }
            
            wrapper.append(header, content);
            placeholder.appendChild(wrapper);
        };
        
        const loadAllSheets = async () => {
            const container = document.getElementById('stats-container');
            const loadingEl = document.getElementById('loading');
            
            try {
                const sections = [
                    { key: 'detailed', title: 'Character Details', renderer: (d, t, p) => renderDetailed(d, t, p, true, false) },
                    { key: 'attributes', title: 'Attributes', renderer: renderAttributesGrid },
                    { key: 'skills', title: 'Skills', renderer: (d, t, p) => renderDetailed(d, t, p, true, false) },
                    { key: 'abilities', title: 'Attainments', renderer: (d, t, p) => renderDetailed(d, t, p, true, false) },
                    { key: 'items', title: getConfig('inventory-title'), renderer: (d, t, p) => renderDetailed(d, t, p, true, true) }
                ];
                
                sections.forEach(({ key }) => {
                    const placeholder = document.createElement('div');
                    placeholder.id = `section-${key}`;
                    placeholder.className = 'section-placeholder'; // Changed class to avoid pre-styling
                    container.appendChild(placeholder);
                });
                
                let loaded = 0;
                const loadPromises = sections.map(async ({ key, title, renderer }, index) => {
                    try {
                        const url = `https://docs.google.com/spreadsheets/d/${CONFIG.baseSheetId}/export?format=csv&gid=${CONFIG.gids[key]}&range=${key === 'attributes' ? 'A2:M15' : 'A:C'}`;
                        const csv = await fetchSheet(url);
                        const data = parseCSV(csv);
                        
                        loaded++;
                        document.getElementById('loading-text').textContent = `Loading Character Sheet... (${loaded}/${sections.length})`;
                        
                        const placeholder = document.getElementById(`section-${key}`);
                        if (data.length && placeholder) {
                            requestAnimationFrame(() => renderer(data, title, placeholder));
                        }
                    } catch (err) {
                        console.error(`Failed to load ${key}:`, err);
                        loaded++;
                        const placeholder = document.getElementById(`section-${key}`);
                        if (placeholder) placeholder.innerHTML = `<div class="error">Failed to load ${title}</div>`;
                    }
                });
                
                await Promise.all(loadPromises);
                
                loadingEl.style.transition = 'opacity 0.3s';
                loadingEl.style.opacity = '0';
                setTimeout(() => loadingEl.style.display = 'none', 300);
                
requestAnimationFrame(() => {
                    const allSections = document.querySelectorAll('.section-wrapper');
                    allSections.forEach(section => {
                        const header = section.querySelector('.section-header');
                        const content = section.querySelector('.section-content');
                        if (header && content) {
                            toggleSection(header, content);
                        }
                    });
                });
                
            } catch (err) {
                console.error('Critical error:', err);
                loadingEl.style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Failed to interpret the ancient texts.';
            }
        };
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadAllSheets);
        } else {
            loadAllSheets();
        }
    </script>
</body>
</html>
